{% extends "base.html" %}

{% block content %}
<h2>{{ post.title }}</h2>
<p class="meta">By {{ post.author.username }} on {{ post.created_at.strftime('%Y-%m-%d') }}</p>

<div class="content">
    {{ post.content | safe }}
</div>

<h3>Comments</h3>
{% for comment in post.comments %}
    <div class="comment">
        <strong>{{ comment.author_name }}</strong>: {{ comment.content }}
    </div>
{% endfor %}
{% endblock %}
