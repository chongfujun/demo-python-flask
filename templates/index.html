{% extends "base.html" %}

{% block content %}
<h2>Latest Posts</h2>

{% if posts %}
    <div class="posts">
        {% for post in posts %}
        <article class="post">
            <h3><a href="{{ url_for('blog.view_post', slug=post.slug) }}">{{ post.title }}</a></h3>
            <p class="meta">Posted on {{ post.created_at.strftime('%Y-%m-%d') }}</p>
            <p>{{ post.content[:200] }}...</p>
        </article>
        {% endfor %}
    </div>
{% else %}
    <p>No posts yet.</p>
{% endif %}
{% endblock %}
